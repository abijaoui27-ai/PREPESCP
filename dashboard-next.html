<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PrepOral Dashboard</title>

  <script src="/dashboard-data.js"></script>

  <style>
    body{
      margin:0;
      background:#07070c;
      color:#f0ede8;
      font-family:Arial,sans-serif;
    }

    main{
      max-width:1100px;
      margin:auto;
      padding:40px 20px;
    }

    .logo{
      font-size:32px;
      color:#c9a96e;
      margin-bottom:30px;
    }

    .tabs{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .tab{
      flex:1;
      padding:14px;
      background:#12121a;
      color:#999;
      border:1px solid #23232f;
      cursor:pointer;
      font-size:16px;
    }

    .tab.active{
      color:white;
      border-color:#c9a96e;
    }

    .panel{
      display:none;
      background:#12121a;
      border:1px solid #23232f;
      padding:24px;
    }

    .panel.active{
      display:block;
    }

    .card{
      background:#171722;
      border:1px solid #26263a;
      padding:20px;
      margin-top:20px;
      border-radius:12px;
    }

    .btn{
      display:inline-block;
      margin-top:10px;
      padding:12px 20px;
      background:#c9a96e;
      color:#07070c;
      text-decoration:none;
      font-weight:bold;
      border-radius:10px;
    }

    .blue{
      background:#0b5ed7;
      color:white;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-top:20px;
    }

    .stat{
      background:#171722;
      border:1px solid #26263a;
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .muted{
      color:#999;
      line-height:1.6;
    }

    @media(max-width:700px){
      .grid{
        grid-template-columns:1fr;
      }

      .tabs{
        flex-direction:column;
      }
    }
  </style>
</head>

<body>

<main>

  <div class="logo">
    PrepOral
  </div>

  <div id="tabs" class="tabs"></div>

  <section id="escp" class="panel active"></section>
  <section id="emlyon" class="panel"></section>
  <section id="essec" class="panel"></section>

</main>

<script src="/dashboard-next.js"></script>

</body>
</html>
